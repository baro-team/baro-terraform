name: Terraform Dev

on:
  pull_request:
    paths:
      - envs/dev/**
      - .github/workflows/terraform-dev.yml
      - README.md
  push:
    branches:
      - main
    paths:
      - envs/dev/**
      - .github/workflows/terraform-dev.yml
      - README.md
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - db-init
          - destroy
      destroy_scope:
        description: Destroy scope. runtime keeps VPC/Subnets/ECR/service secret placeholders.
        required: false
        default: runtime
        type: choice
        options:
          - runtime
          - all
      confirm_destroy:
        description: Type destroy-dev for runtime destroy, destroy-dev-all for all destroy
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform:
    name: Terraform Dev
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate destroy confirmation
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        env:
          DESTROY_SCOPE: ${{ inputs.destroy_scope }}
          CONFIRM_DESTROY: ${{ inputs.confirm_destroy }}
        run: |
          case "$DESTROY_SCOPE" in
            runtime) expected="destroy-dev" ;;
            all) expected="destroy-dev-all" ;;
            *) echo "Invalid destroy_scope: $DESTROY_SCOPE"; exit 1 ;;
          esac

          if [ "$CONFIRM_DESTROY" != "$expected" ]; then
            echo "Destroy scope '$DESTROY_SCOPE' requires confirm_destroy=$expected"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Snapshot RDS before destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: |
          SNAPSHOT_ID="baro-dev-pre-destroy-$(date +%Y%m%d%H%M%S)"

          # RDS 인스턴스 존재 여부 확인 (exit code 기반)
          if ! aws rds describe-db-instances \
            --db-instance-identifier baro-dev-postgres \
            --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "RDS 인스턴스가 없습니다. 스냅샷 생략."
            exit 0
          fi

          # RDS 상태 확인 (available 상태일 때만 스냅샷 가능)
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier baro-dev-postgres \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text)

          echo "RDS 현재 상태: $STATUS"

          if [ "$STATUS" != "available" ]; then
            echo "RDS 상태가 available이 아닙니다 ($STATUS). 스냅샷을 생성할 수 없습니다."
            exit 1
          fi

          echo "RDS 스냅샷 생성 중: $SNAPSHOT_ID"
          aws rds create-db-snapshot \
            --db-instance-identifier baro-dev-postgres \
            --db-snapshot-identifier "$SNAPSHOT_ID" \
            --region ${{ env.AWS_REGION }}

          echo "스냅샷 완료 대기 중..."
          aws rds wait db-snapshot-completed \
            --db-snapshot-identifier "$SNAPSHOT_ID" \
            --region ${{ env.AWS_REGION }}

          echo "스냅샷 완료: $SNAPSHOT_ID"

      - name: Resolve latest RDS snapshot
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        run: |
          # RDS가 이미 존재하면 스냅샷 복원 불필요
          if aws rds describe-db-instances \
            --db-instance-identifier baro-dev-postgres \
            --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "RDS 이미 실행 중 → 스냅샷 복원 생략"
            exit 0
          fi

          # RDS가 없을 때만 최신 수동 스냅샷 탐색
          SNAPSHOT_ID=$(aws rds describe-db-snapshots \
            --db-instance-identifier baro-dev-postgres \
            --snapshot-type manual \
            --region ${{ env.AWS_REGION }} \
            --query "reverse(sort_by(DBSnapshots, &SnapshotCreateTime))[0].DBSnapshotIdentifier" \
            --output text 2>/dev/null || echo "")

          if [ -z "$SNAPSHOT_ID" ] || [ "$SNAPSHOT_ID" = "None" ]; then
            echo "스냅샷 없음 → 새 RDS 생성"
          else
            echo "스냅샷 발견: $SNAPSHOT_ID"
            echo "TF_VAR_restore_snapshot_id=$SNAPSHOT_ID" >> $GITHUB_ENV
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl.example

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: github.event_name != 'workflow_dispatch' || (inputs.action != 'destroy' && inputs.action != 'db-init')
        run: terraform plan -no-color -out=tfplan

      - name: Terraform runtime suspend plan
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.destroy_scope == 'runtime'
        run: terraform plan -no-color -out=tfplan -var='runtime_enabled=false'

      - name: Terraform full destroy plan
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.destroy_scope == 'all'
        run: terraform plan -destroy -no-color -out=tfplan

      - name: Guard runtime destroy keep-list
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.destroy_scope == 'runtime'
        run: |
          terraform show -json tfplan > tfplan.json

          blocked_addresses="$(jq -r '
            .resource_changes[]?
            | select(.change.actions | index("delete"))
            | select(
                .address | test("^(aws_vpc\\.this|aws_subnet\\.(public|private)|aws_internet_gateway\\.this|aws_route_table\\.public|aws_route_table_association\\.public|aws_ecr_repository\\.service|aws_ecr_lifecycle_policy\\.service|aws_secretsmanager_secret\\.|aws_secretsmanager_secret_version\\.)")
              )
            | .address
          ' tfplan.json)"

          if [ -n "$blocked_addresses" ]; then
            echo "Runtime destroy plan includes keep-list resources:"
            echo "$blocked_addresses"
            exit 1
          fi

      - name: Terraform apply
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        run: terraform apply -auto-approve -no-color tfplan

      - name: Terraform destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: terraform apply -auto-approve -no-color tfplan

      - name: Run DB init task
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'apply' || inputs.action == 'db-init'))
        run: |
          cluster_name="$(terraform output -raw ecs_cluster_name)"
          task_definition_arn="$(terraform output -raw db_init_task_definition_arn)"
          security_group_id="$(terraform output -raw ecs_tasks_security_group_id)"
          subnet_ids="$(terraform output -json private_subnet_ids | jq -r 'join(",")')"

          task_arn="$(aws ecs run-task \
            --region "$AWS_REGION" \
            --cluster "$cluster_name" \
            --launch-type FARGATE \
            --task-definition "$task_definition_arn" \
            --network-configuration "awsvpcConfiguration={subnets=[$subnet_ids],securityGroups=[$security_group_id],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)"

          if [ -z "$task_arn" ] || [ "$task_arn" = "None" ]; then
            echo "Failed to start DB init task"
            exit 1
          fi

          echo "Started DB init task: $task_arn"

          aws ecs wait tasks-stopped \
            --region "$AWS_REGION" \
            --cluster "$cluster_name" \
            --tasks "$task_arn"

          exit_code="$(aws ecs describe-tasks \
            --region "$AWS_REGION" \
            --cluster "$cluster_name" \
            --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)"

          if [ "$exit_code" != "0" ]; then
            echo "DB init task failed with exit code: $exit_code"
            aws ecs describe-tasks \
              --region "$AWS_REGION" \
              --cluster "$cluster_name" \
              --tasks "$task_arn"
            exit 1
          fi

          echo "DB init task completed successfully"

      - name: Deploy baro-edge
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=baro-dev-mosquitto" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text \
            --region "$AWS_REGION")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "mosquitto EC2 없음 — baro-edge 배포 생략"
            exit 0
          fi

          echo "mosquitto EC2: $INSTANCE_ID — SSM 등록 대기 중 (최대 10분)"
          for i in $(seq 1 30); do
            PING=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text \
              --region "$AWS_REGION" 2>/dev/null || echo "None")

            if [ "$PING" = "Online" ]; then
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "SSM 등록 타임아웃 (10분 초과)"
              exit 1
            fi

            echo "[$i/30] SSM 대기 중 ($PING)..."
            sleep 20
          done

          echo "SSM Online — baro-edge 배포 시작"

          ECR_REGISTRY=$(aws ecr describe-repositories \
            --repository-names baro-dev-baro-edge \
            --query 'repositories[0].repositoryUri' \
            --output text \
            --region "$AWS_REGION" | cut -d'/' -f1)
          IMAGE="$ECR_REGISTRY/baro-dev-baro-edge:latest"

          MQTT_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id baro-dev/mosquitto/credentials \
            --region "$AWS_REGION" \
            --query SecretString \
            --output text)
          MQTT_USER=$(echo "$MQTT_SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['username'])")
          MQTT_PASS=$(echo "$MQTT_SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY\",
              \"docker pull $IMAGE\",
              \"docker stop baro-edge || true\",
              \"docker rm baro-edge || true\",
              \"docker run -d --name baro-edge --network baro-edge-net --restart unless-stopped -e MQTT_BROKER_HOST=mosquitto -e MQTT_BROKER_PORT=1883 -e MQTT_USERNAME=$MQTT_USER -e MQTT_PASSWORD=$MQTT_PASS $IMAGE\"
            ]" \
            --region "$AWS_REGION" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query 'Status' \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query 'StandardErrorContent' \
              --output text
            exit 1
          fi

          echo "baro-edge 배포 완료"
