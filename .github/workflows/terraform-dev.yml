name: Terraform Dev

on:
  pull_request:
    paths:
      - envs/dev/**
      - .github/workflows/terraform-dev.yml
      - README.md
  push:
    branches:
      - main
    paths:
      - envs/dev/**
      - .github/workflows/terraform-dev.yml
      - README.md
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      destroy_scope:
        description: Destroy scope. runtime keeps VPC/Subnets/ECR/service secret placeholders.
        required: false
        default: runtime
        type: choice
        options:
          - runtime
          - all
      confirm_destroy:
        description: Type destroy-dev for runtime destroy, destroy-dev-all for all destroy
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform:
    name: Terraform Dev
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate destroy confirmation
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        env:
          DESTROY_SCOPE: ${{ inputs.destroy_scope }}
          CONFIRM_DESTROY: ${{ inputs.confirm_destroy }}
        run: |
          case "$DESTROY_SCOPE" in
            runtime) expected="destroy-dev" ;;
            all) expected="destroy-dev-all" ;;
            *) echo "Invalid destroy_scope: $DESTROY_SCOPE"; exit 1 ;;
          esac

          if [ "$CONFIRM_DESTROY" != "$expected" ]; then
            echo "Destroy scope '$DESTROY_SCOPE' requires confirm_destroy=$expected"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl.example

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: github.event_name != 'workflow_dispatch' || inputs.action != 'destroy'
        run: terraform plan -no-color -out=tfplan

      - name: Terraform runtime destroy plan
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.destroy_scope == 'runtime'
        run: |
          terraform plan -destroy -no-color -out=tfplan \
            -target=aws_route_table_association.private \
            -target=aws_route_table.private \
            -target=aws_nat_gateway.this \
            -target=aws_eip.nat \
            -target=aws_ecs_service.service \
            -target=aws_ecs_task_definition.service \
            -target=aws_ecs_cluster.this \
            -target=aws_cloudwatch_log_group.service \
            -target=aws_ecs_task_definition.db_init \
            -target=aws_cloudwatch_log_group.db_init \
            -target=aws_lb_listener_rule.user_docs \
            -target=aws_lb_listener_rule.service \
            -target=aws_lb_listener.http \
            -target=aws_lb_target_group.service \
            -target=aws_lb.this \
            -target=aws_security_group_rule.alb_to_tasks \
            -target=aws_security_group.alb \
            -target=aws_security_group.ecs_tasks \
            -target=aws_db_instance.postgres \
            -target=aws_db_subnet_group.this \
            -target=aws_security_group.rds \
            -target=random_password.rds_master \
            -target=aws_secretsmanager_secret.rds_master \
            -target=aws_secretsmanager_secret_version.rds_master \
            -target=aws_secretsmanager_secret_version.user_db_url \
            -target=aws_secretsmanager_secret_version.user_db_username \
            -target=aws_secretsmanager_secret_version.user_db_password \
            -target=aws_secretsmanager_secret_version.dispatch_db_url \
            -target=aws_secretsmanager_secret_version.dispatch_db_username \
            -target=aws_secretsmanager_secret_version.dispatch_db_password \
            -target=aws_iam_role_policy_attachment.ecs_task_execution \
            -target=aws_iam_role_policy.ecs_task_execution_secrets \
            -target=aws_iam_role.ecs_task_execution \
            -target=aws_iam_role.ecs_task

      - name: Terraform full destroy plan
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.destroy_scope == 'all'
        run: terraform plan -destroy -no-color -out=tfplan

      - name: Guard runtime destroy keep-list
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.destroy_scope == 'runtime'
        run: |
          terraform show -json tfplan > tfplan.json

          blocked_addresses="$(jq -r '
            .resource_changes[]?
            | select(.change.actions | index("delete"))
            | select(
                .address | test("^(aws_vpc\\.this|aws_subnet\\.(public|private)|aws_internet_gateway\\.this|aws_route_table\\.public|aws_route_table_association\\.public|aws_ecr_repository\\.service|aws_ecr_lifecycle_policy\\.service|aws_secretsmanager_secret\\.service)")
              )
            | .address
          ' tfplan.json)"

          if [ -n "$blocked_addresses" ]; then
            echo "Runtime destroy plan includes keep-list resources:"
            echo "$blocked_addresses"
            exit 1
          fi

      - name: Terraform apply
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        run: terraform apply -auto-approve -no-color tfplan

      - name: Terraform destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: terraform apply -auto-approve -no-color tfplan
