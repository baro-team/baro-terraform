name: Terraform Dev

on:
  pull_request:
    paths:
      - envs/dev-shared/**
      - envs/dev-services/**
      - .github/workflows/terraform-dev.yml
      - README.md
  push:
    branches:
      - main
    paths:
      - envs/dev-shared/**
      - envs/dev-services/**
      - .github/workflows/terraform-dev.yml
      - README.md
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      stack:
        description: Terraform stack to run
        required: true
        default: services
        type: choice
        options:
          - shared
          - services
          - all
      confirm_destroy:
        description: Type destroy-dev-services for services destroy or destroy-dev-all for all destroy
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  terraform:
    name: Terraform Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate destroy confirmation
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        env:
          STACK: ${{ inputs.stack }}
          CONFIRM_DESTROY: ${{ inputs.confirm_destroy }}
        run: |
          case "$STACK" in
            services) expected="destroy-dev-services" ;;
            all) expected="destroy-dev-all" ;;
            shared) echo "Standalone shared destroy is disabled. Use stack=all after reviewing the plan."; exit 1 ;;
            *) echo "Invalid stack: $STACK"; exit 1 ;;
          esac

          if [ "$CONFIRM_DESTROY" != "$expected" ]; then
            echo "Destroy stack '$STACK' requires confirm_destroy=$expected"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Check dev-shared state exists
        id: shared_state
        if: github.event_name != 'workflow_dispatch' || inputs.stack == 'services' || inputs.stack == 'all'
        run: |
          if aws s3api head-object \
            --bucket baro-dev-terraform-state-379992420279 \
            --key baro/dev-shared/terraform.tfstate \
            >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "dev-shared state does not exist yet; skipping services plan until shared is bootstrapped."
          fi

      - name: Terraform fmt
        run: terraform fmt -check -recursive envs/dev-shared envs/dev-services

      - name: Terraform shared init
        if: github.event_name != 'workflow_dispatch' || inputs.stack == 'shared' || inputs.stack == 'all'
        working-directory: envs/dev-shared
        run: terraform init -backend-config=backend.hcl.example

      - name: Terraform shared validate
        if: github.event_name != 'workflow_dispatch' || inputs.stack == 'shared' || inputs.stack == 'all'
        working-directory: envs/dev-shared
        run: terraform validate

      - name: Terraform services init
        if: github.event_name != 'workflow_dispatch' || inputs.stack == 'services' || inputs.stack == 'all'
        working-directory: envs/dev-services
        run: terraform init -backend-config=backend.hcl.example

      - name: Terraform services validate
        if: github.event_name != 'workflow_dispatch' || inputs.stack == 'services' || inputs.stack == 'all'
        working-directory: envs/dev-services
        run: terraform validate

      - name: Terraform shared plan
        if: >-
          github.event_name == 'pull_request' ||
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'plan' && (inputs.stack == 'shared' || inputs.stack == 'all'))
        working-directory: envs/dev-shared
        run: terraform plan -no-color

      - name: Terraform services plan
        if: >-
          steps.shared_state.outputs.exists == 'true' &&
          (github.event_name == 'pull_request' ||
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'plan' && (inputs.stack == 'services' || inputs.stack == 'all')))
        working-directory: envs/dev-services
        run: terraform plan -no-color

      - name: Terraform shared apply
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && (inputs.stack == 'shared' || inputs.stack == 'all')
        working-directory: envs/dev-shared
        run: terraform apply -auto-approve -no-color

      - name: Terraform services apply
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && (inputs.stack == 'services' || inputs.stack == 'all')
        working-directory: envs/dev-services
        run: terraform apply -auto-approve -no-color

      - name: Terraform services destroy plan
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && (inputs.stack == 'services' || inputs.stack == 'all')
        working-directory: envs/dev-services
        run: terraform plan -destroy -no-color -out=tfplan

      - name: Terraform services destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && (inputs.stack == 'services' || inputs.stack == 'all')
        working-directory: envs/dev-services
        run: terraform apply -auto-approve -no-color tfplan

      - name: Terraform shared destroy plan
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.stack == 'all'
        working-directory: envs/dev-shared
        run: terraform plan -destroy -no-color -out=tfplan

      - name: Terraform shared destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.stack == 'all'
        working-directory: envs/dev-shared
        run: terraform apply -auto-approve -no-color tfplan
