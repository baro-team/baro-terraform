name: Terraform Dev

on:
  pull_request:
    paths:
      - envs/dev/**
      - .github/workflows/terraform-dev.yml
      - README.md
  push:
    branches:
      - main
    paths:
      - envs/dev/**
      - .github/workflows/terraform-dev.yml
      - README.md
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: Type destroy-dev to allow destroy
        required: false
        default: ""
      user_desired_count:
        description: Desired count for user-service
        required: true
        default: "1"
      dispatch_desired_count:
        description: Desired count for dispatch-service
        required: true
        default: "0"

permissions:
  contents: read

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  terraform:
    name: Terraform Dev
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl.example

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: github.event_name != 'workflow_dispatch' || inputs.action != 'destroy'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            terraform plan -no-color -out=tfplan \
              -var='service_desired_counts={"user"=${{ inputs.user_desired_count }},"dispatch"=${{ inputs.dispatch_desired_count }}}'
          else
            terraform plan -no-color -out=tfplan
          fi

      - name: Terraform destroy plan
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: terraform plan -destroy -no-color -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color tfplan

      - name: Terraform destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.confirm_destroy == 'destroy-dev'
        run: terraform apply -auto-approve -no-color tfplan

      - name: Destroy confirmation failed
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.confirm_destroy != 'destroy-dev'
        run: |
          echo "Destroy requires confirm_destroy=destroy-dev"
          exit 1
